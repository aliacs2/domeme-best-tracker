<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>도매꾹 인기 랭킹 트래커</title>
<style>
/* 감쟈님이 주신 스타일 그대로 유지 */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; background: #f3f4f6; padding: 20px; color: #111; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 14px; }

/* 날짜 선택바 스타일 추가 */
.date-bar { background: #fff; border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.date-bar label { font-size: 11px; color: #888; font-weight: 600; }
#dateSelect { padding: 6px 12px; border-radius: 7px; border: 1px solid #e5e7eb; font-size: 13px; outline: none; cursor: pointer; }

/* ── 탭 ── */
.tab-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
.tab-btn { padding: 7px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 12px; background: #fff; cursor: pointer; color: #555; white-space: nowrap; transition: all .12s; }
.tab-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; font-weight: 600; }
.tab-btn:hover:not(.active) { background: #f0f0ff; border-color: #c7d2fe; color: #4f46e5; }

/* ── 컨트롤 및 테이블 스타일 (생략 없이 원본 그대로 적용 권장) ── */
.controls { background: #fff; border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.07); display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
.ctrl-group { display: flex; flex-direction: column; gap: 4px; }
.ctrl-group label { font-size: 11px; color: #888; font-weight: 600; }
.ctrl-group input { padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 7px; font-size: 13px; width: 180px; font-family: inherit; outline: none; }
.price-range { display: flex; gap: 5px; align-items: center; }
.price-range span { font-size: 12px; color: #bbb; }
.ctrl-group select { padding: 6px 8px; border: 1px solid #e5e7eb; border-radius: 7px; font-size: 13px; background: #fff; outline: none; cursor: pointer; }
.btn-reset { padding: 6px 14px; border: 1px solid #e5e7eb; border-radius: 7px; font-size: 12px; background: #fff; cursor: pointer; color: #555; }

.legend { display: flex; gap: 12px; margin-bottom: 8px; align-items: center; font-size: 12px; color: #666; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 11px; height: 11px; border-radius: 3px; }
.dot-new { background: #fde68a; border: 1px solid #f59e0b; }
.dot-up  { background: #bbf7d0; border: 1px solid #22c55e; }
.count-label { font-size: 12px; color: #888; margin-bottom: 7px; }

.table-wrap { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
thead { background: #f9fafb; }
th { padding: 10px 8px; font-size: 11px; color: #888; font-weight: 600; border-bottom: 1px solid #e5e7eb; white-space: nowrap; letter-spacing: .3px; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { background: #f0f0ff; color: #4f46e5; }
th.asc  .sort-icon::after { content: ' ▲'; color: #4f46e5; font-size: 9px; }
th.desc .sort-icon::after { content: ' ▼'; color: #4f46e5; font-size: 9px; }
th:not(.asc):not(.desc) .sort-icon::after { content: ' ⇅'; color: #ccc; font-size: 9px; }
td { padding: 8px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; text-align: center; }

.thumb { width: 192px; height: 192px; object-fit: cover; border-radius: 7px; border: 1px solid #e5e7eb; display: block; margin: auto; }
.title-link { color: #111; text-decoration: none; font-size: 12px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-align: left; }
.title-link:hover { color: #4f46e5; text-decoration: underline; }
.chg-up { color: #16a34a; font-weight: 700; }
.chg-down { color: #dc2626; font-weight: 700; }
.badge-new { display: inline-block; background: #fde68a; color: #92400e; padding: 2px 6px; border-radius: 5px; font-size: 11px; font-weight: 700; border: 1px solid #f59e0b; }
.badge-biz { display: inline-block; background: #fff7ed; color: #9a3412; padding: 1px 5px; border-radius: 4px; font-size: 10px; margin-left: 4px; border: 1px solid #fed7aa; vertical-align: middle; }
.cat-tag { display: inline-block; font-size: 10px; color: #6366f1; background: #ede9fe; border-radius: 3px; padding: 1px 5px; margin-top: 2px; }
tr.hl-new td { background: #fffbeb; border-left: 3px solid #f59e0b; }
tr.hl-up  td { background: #f0fdf4; border-left: 3px solid #22c55e; }

/* ── 북마크 관련 스타일 그대로 복사 ── */
.bm-btn { background: none; border: none; cursor: pointer; font-size: 20px; line-height: 1; transition: transform .15s; }
.bm-btn.on { color: #f59e0b; }
.bm-btn.off { color: #ddd; }
.folder-bar { background: #fff; border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.folder-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 5px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #e5e7eb; background: #f9fafb; display: flex; align-items: center; gap: 5px; }
.chip.active { background: #4f46e5; color: #fff; }
.popup-overlay { display: none; position: fixed; inset: 0; z-index: 199; background: rgba(0,0,0,0.1); }
.popup { display: none; position: fixed; z-index: 200; background: #fff; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.14); width: 250px; padding: 14px; }
.popup.open { display: block; }
</style>
</head>
<body>

<h1>도매꾹 인기 랭킹 트래커 🥔</h1>

    <button class="tab-btn" id="tab-cat03" onclick="switchTab('cat03')">출산/유아동/완구</button>

    <button class="tab-btn" id="tab-bm" onclick="switchTab('bm')">🔖 북마크 <span id="bmBadge"></span></button>

        <th style="width:200px">이미지</th>
        <th class="sortable" id="th-bm-changeNum" onclick="sortByBm('changeNum')">변동</th>
        <th>상품명</th>
        <th class="sortable" id="th-bm-priceNum" onclick="sortByBm('priceNum')">가격</th>
        <th style="width:70px">수량</th>
      </tr></thead>
      <tbody id="bmBody"></tbody>
    </table>
  </div>
</div>
