<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>도매꾹 인기 랭킹 트래커</title>
<style>
/* 기존 스타일 유지 및 날짜 바 스타일 추가 */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; background: #f3f4f6; padding: 20px; color: #111; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 14px; }
.date-bar { background: #fff; border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.date-bar label { font-size: 11px; color: #888; font-weight: 600; }
#dateSelect { padding: 6px 12px; border-radius: 7px; border: 1px solid #e5e7eb; font-size: 13px; outline: none; cursor: pointer; }

/* ── 탭 ── */
.tab-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
.tab-btn { padding: 7px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 12px; background: #fff; cursor: pointer; color: #555; }
.tab-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; font-weight: 600; }

/* ── 컨트롤 ── */
.controls { background: #fff; border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
.ctrl-group { display: flex; flex-direction: column; gap: 4px; }
.ctrl-group label { font-size: 11px; color: #888; font-weight: 600; }
.ctrl-group input { padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 7px; font-size: 13px; outline: none; }
.price-range { display: flex; gap: 5px; align-items: center; }
.price-range input { width: 90px; }

/* ── 테이블 및 기타 ── */
.table-wrap { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th { padding: 10px 8px; font-size: 11px; color: #888; background: #f9fafb; border-bottom: 1px solid #e5e7eb; cursor: pointer; }
td { padding: 8px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; text-align: center; }
.col-img { width: 200px; }
.thumb { width: 192px; height: 192px; object-fit: cover; border-radius: 7px; border: 1px solid #e5e7eb; margin: auto; }
.title-link { color: #111; text-decoration: none; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-align: left; }
.chg-up { color: #16a34a; font-weight: 700; }
.chg-down { color: #dc2626; font-weight: 700; }
.badge-new { background: #fde68a; color: #92400e; padding: 2px 6px; border-radius: 5px; font-size: 11px; border: 1px solid #f59e0b; }
tr.hl-new td { background: #fffbeb; border-left: 3px solid #f59e0b; }
tr.hl-up td { background: #f0fdf4; border-left: 3px solid #22c55e; }
</style>
</head>
<body>
<h1>도매꾹 인기 랭킹 트래커</h1>

<div class="date-bar">
    <label>분석 날짜 선택</label>
    <select id="dateSelect" onchange="changeDate(this.value)">
        <option>날짜 로딩 중...</option>
    </select>
</div>

<div class="tab-bar" id="tabBar">
    <button class="tab-btn active" onclick="switchTab('all')">전체 랭킹</button>
    <button class="tab-btn" onclick="switchTab('cat01')">패션잡화/화장품</button>
    <button class="tab-btn" onclick="switchTab('cat02')">의류/언더웨어</button>
    <button class="tab-btn" onclick="switchTab('cat03')">출산/유아동/완구</button>
    <button class="tab-btn" onclick="switchTab('cat04')">가구/생활/취미</button>
    <button class="tab-btn" onclick="switchTab('cat05')">스포츠/건강/식품</button>
    <button class="tab-btn" onclick="switchTab('cat06')">가전/휴대폰/산업</button>
    <button class="tab-btn" onclick="switchTab('merged')">🗂 카테고리 합산</button>
</div>

<div class="controls">
    <div class="ctrl-group">
        <label>상품명 검색</label>
        <input type="text" id="searchInput" placeholder="검색어 입력..." oninput="render()">
    </div>
    <div class="ctrl-group">
        <label>가격 범위 (원)</label>
        <div class="price-range">
            <input type="number" id="priceMin" placeholder="최소" oninput="render()">
            <span>~</span>
            <input type="number" id="priceMax" placeholder="최대" oninput="render()">
        </div>
    </div>
    <div class="ctrl-group">
        <label>구분 필터</label>
        <select id="bizFilter" onchange="render()">
            <option value="">전체</option>
            <option value="일반">일반</option>
            <option value="사업자 전용">사업자 전용</option>
        </select>
    </div>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th style="width:60px">순위</th>
                <th class="col-img">이미지</th>
                <th style="width:80px">변동</th>
                <th>상품명</th>
                <th style="width:100px">가격</th>
                <th style="width:80px">최소수량</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
let ALL_DATA = {};
let currentTab = 'all';

async function init() {
    try {
        const res = await fetch('./data/index.json');
        const dates = await res.json();
        const select = document.getElementById('dateSelect');
        select.innerHTML = dates.map(d => `<option value="${d}">${d} 리포트</option>`).join('');
        changeDate(dates[0]);
    } catch (e) {
        console.error("인덱스 로드 실패:", e);
        document.getElementById('dateSelect').innerHTML = "<option>데이터 없음</option>";
    }
}

async function changeDate(date) {
    try {
        const res = await fetch(`./data/${date}.json`);
        ALL_DATA = await res.json();
        render();
    } catch (e) {
        console.error("데이터 로드 실패:", e);
    }
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText.includes(tab === 'all' ? '전체' : tab === 'merged' ? '합산' : ''));
    });
    // 실제 탭 텍스트 매칭이 어려우면 인덱스나 다른 방식으로 active 처리 가능
    render();
}

function render() {
    const list = ALL_DATA[currentTab] || [];
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    const priceMin = parseInt(document.getElementById('priceMin').value) || 0;
    const priceMax = parseInt(document.getElementById('priceMax').value) || Infinity;
    const bizFilter = document.getElementById('bizFilter').value;

    const filtered = list.filter(item => {
        const p = parseInt(item.price) || 0;
        if (keyword && !item.title.toLowerCase().includes(keyword)) return false;
        if (p < priceMin || p > priceMax) return false;
        if (bizFilter && item.biz !== bizFilter) return false;
        return true;
    });

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = filtered.map(d => {
        let chgHtml = d.change;
        if (d.change === 'NEW') chgHtml = '<span class="badge-new">NEW</span>';
        else if (d.change.includes('▲')) chgHtml = `<span class="chg-up">${d.change}</span>`;
        else if (d.change.includes('▼')) chgHtml = `<span class="chg-down">${d.change}</span>`;

        const hlClass = d.change === 'NEW' ? 'hl-new' : (d.change.includes('▲') && parseInt(d.change.replace(/[^0-9]/g,'')) >= 3) ? 'hl-up' : '';

        return `<tr class="${hlClass}">
            <td><span class="rank-num">${d.rank}</span></td>
            <td><img src="${d.img}" class="thumb" loading="lazy"></td>
            <td>${chgHtml}</td>
            <td>
                <a href="${d.url}" target="_blank" class="title-link">${d.title}</a>
                ${d.biz === '사업자 전용' ? '<span style="font-size:10px; color:#9a3412; background:#fff7ed; border:1px solid #fed7aa; padding:1px 4px; border-radius:4px; margin-left:5px;">사업자</span>' : ''}
                ${d.cat_label ? `<div style="font-size:10px; color:#6366f1; background:#ede9fe; padding:1px 5px; border-radius:3px; display:inline-block; margin-top:4px;">${d.cat_label}</div>` : ''}
            </td>
            <td style="text-align:right; font-weight:bold;">${parseInt(d.price).toLocaleString()}원</td>
            <td style="color:#999; font-size:11px;">최소 ${d.qty}개</td>
        </tr>`;
    }).join('');
}

init();
</script>
</body>
</html>
