<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>도매꾹 트래킹 센터</title>
<style>
/* (제공해주신 기존 CSS 스타일 모두 유지) */
/* 날짜 선택을 위한 스타일만 추가 */
.date-bar { background: #fff; border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.date-bar label { font-size: 11px; color: #888; font-weight: 600; }
#dateSelect { padding: 6px 12px; border-radius: 7px; border: 1px solid #e5e7eb; font-family: inherit; font-size: 13px; }
</style>
</head>
<body>
<h1>도매꾹 인기 랭킹 트래커</h1>

<div class="date-bar">
    <label>분석 날짜 선택</label>
    <select id="dateSelect" onchange="changeDate(this.value)">
        <option>날짜 로딩 중...</option>
    </select>
</div>

<div class="tab-bar">
  </div>

<script>
let ALL_DATA = {}; // 전역 데이터 저장소
let currentTab = 'all';

// 1. 날짜 목록 불러오기
async function init() {
    try {
        const res = await fetch('data/index.json');
        const dates = await res.json();
        const select = document.getElementById('dateSelect');
        select.innerHTML = dates.map(d => `<option value="${d}">${d} 리포트</option>`).join('');
        changeDate(dates[0]); // 최신 날짜 로드
    } catch (e) {
        alert("데이터 인덱스를 찾을 수 없습니다.");
    }
}

// 2. 특정 날짜 데이터 로드
async function changeDate(date) {
    try {
        const res = await fetch(`data/${date}.json`);
        ALL_DATA = await res.json();
        renderAll(); // 데이터 로드 후 화면 갱신
    } catch (e) {
        alert("데이터 파일을 불러오는 데 실패했습니다.");
    }
}

// 3. 기존의 render, switchTab, sortBy 등 모든 JS 로직을 여기에 통합
// (제공해주신 js_template.js의 내용을 이 아래에 그대로 붙여넣으시면 됩니다)
// 단, 하드코딩된 __ALL_DATA__ 부분을 ALL_DATA 전역 변수로 대체합니다.
</script>
</body>
</html>
